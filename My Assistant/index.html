<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1c;
    --border: #2a2a2e;
    --accent: #c8f06e;
    --accent-dim: #8faa45;
    --text: #f0f0ee;
    --text-muted: #6b6b72;
    --error: #ff6b6b;
    --calendar: #6ec8f0;
    --reminder: #f0c86e;
    --note: #b06ef0;
    --email: #f06e9e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 60% 20%, rgba(200,240,110,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(110,200,240,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 48px;
    text-align: center;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .logo span {
    color: var(--accent);
    font-style: italic;
  }

  .tagline {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* API Key Setup */
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .setup-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .setup-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .api-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--accent); }
  .api-input::placeholder { color: var(--text-muted); }

  .save-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .save-btn:hover { opacity: 0.85; }

  .key-status {
    font-size: 11px;
    margin-top: 10px;
    color: var(--text-muted);
  }

  .key-status.ok { color: var(--accent); }

  /* Main mic area */
  .mic-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .mic-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(200,240,110,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .mic-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
    margin-bottom: 24px;
  }

  .mic-btn:hover {
    background: rgba(200,240,110,0.08);
    transform: scale(1.05);
  }

  .mic-btn.recording {
    background: rgba(200,240,110,0.12);
    border-color: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .mic-btn.recording::before,
  .mic-btn.recording::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--accent);
    animation: ripple 1.5s ease-out infinite;
  }

  .mic-btn.recording::after { animation-delay: 0.75s; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes ripple {
    0% { width: 100px; height: 100px; opacity: 0.6; }
    100% { width: 180px; height: 180px; opacity: 0; }
  }

  .mic-icon {
    font-size: 36px;
    transition: transform 0.2s;
  }

  .mic-instruction {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 16px;
  }

  /* Transcript box */
  .transcript-box {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    min-height: 60px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    font-style: italic;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .transcript-box.visible { opacity: 1; }
  .transcript-box.placeholder { color: var(--text-muted); font-style: normal; }

  /* Or type it */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    margin-top: 20px;
    width: 100%;
  }

  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

  .text-input-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .text-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--text-muted); }

  .send-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
    display: none;
    animation: slideUp 0.4s ease;
  }

  .result-card.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 20px;
  }

  .type-CALENDAR { background: rgba(110,200,240,0.15); color: var(--calendar); border: 1px solid rgba(110,200,240,0.3); }
  .type-REMINDER { background: rgba(240,200,110,0.15); color: var(--reminder); border: 1px solid rgba(240,200,110,0.3); }
  .type-NOTE { background: rgba(176,110,240,0.15); color: var(--note); border: 1px solid rgba(176,110,240,0.3); }
  .type-EMAIL { background: rgba(240,110,158,0.15); color: var(--email); border: 1px solid rgba(240,110,158,0.3); }

  .result-field {
    margin-bottom: 16px;
  }

  .result-field-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .result-field-value {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }

  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s, transform 0.1s;
    text-decoration: none;
    margin-right: 10px;
    margin-top: 8px;
  }

  .action-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .action-btn:active { transform: translateY(0); }

  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-secondary { background: var(--border); color: var(--text); }

  /* Loading */
  .loading-indicator {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 20px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .loading-indicator.visible { display: flex; }

  .loading-dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 2px;
    animation: bounce 1s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* History */
  .history-section { margin-top: 8px; }

  .history-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .history-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-CALENDAR { background: var(--calendar); }
  .dot-REMINDER { background: var(--reminder); }
  .dot-NOTE { background: var(--note); }
  .dot-EMAIL { background: var(--email); }

  .history-title { color: var(--text); flex: 1; }
  .history-time { font-size: 10px; }

  .copied-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 100;
  }

  .copied-toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">My <span>Assistant</span></div>
    <div class="tagline">Powered by Claude</div>
  </header>

  <!-- API Key Setup -->
  <div class="setup-card">
    <div class="setup-label">Claude API Key</div>
    <div class="setup-row">
      <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-ant-api03-..." />
      <button class="save-btn" onclick="saveKey()">Save</button>
    </div>
    <div class="key-status" id="keyStatus">Enter your API key to get started</div>
  </div>

  <!-- Mic Area -->
  <div class="mic-area">
    <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
      <span class="mic-icon" id="micIcon">🎙️</span>
    </button>
    <div class="mic-instruction" id="micInstruction">TAP TO SPEAK</div>
    <div class="transcript-box placeholder" id="transcriptBox">Your words will appear here...</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or type it</div>
      <div class="divider-line"></div>
    </div>

    <div class="text-input-row">
      <input type="text" class="text-input" id="textInput" placeholder="Remind me to call Louise tomorrow at 2pm..." onkeydown="if(event.key==='Enter') sendText()" />
      <button class="send-btn" id="sendBtn" onclick="sendText()">Send</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-indicator" id="loadingIndicator">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    Thinking...
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-type-badge" id="resultBadge"></div>
    <div id="resultFields"></div>
    <div id="resultActions"></div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-label">Recent</div>
    <div id="historyList"></div>
  </div>
</div>

<div class="copied-toast" id="copiedToast">Copied to clipboard!</div>

<script>
  let apiKey = '';
  let isRecording = false;
  let recognition = null;
  let history = [];

  const typeEmoji = { CALENDAR: '📅', REMINDER: '⏰', NOTE: '📝', EMAIL: '✉️' };
  const typeLabel = { CALENDAR: 'Calendar Event', REMINDER: 'Reminder', NOTE: 'Note', EMAIL: 'Email Draft' };

  // Load saved key
  window.onload = () => {
    const saved = localStorage.getItem('claude_assistant_key');
    if (saved) {
      apiKey = saved;
      document.getElementById('apiKeyInput').value = saved;
      document.getElementById('keyStatus').textContent = '✓ API key loaded';
      document.getElementById('keyStatus').className = 'key-status ok';
    }
    setupSpeechRecognition();
  };

  function saveKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val) return;
    apiKey = val;
    localStorage.setItem('claude_assistant_key', val);
    document.getElementById('keyStatus').textContent = '✓ API key saved';
    document.getElementById('keyStatus').className = 'key-status ok';
  }

  function setupSpeechRecognition() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      document.getElementById('micBtn').style.opacity = '0.3';
      document.getElementById('micInstruction').textContent = 'USE TEXT INPUT BELOW';
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-AU';

    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      const box = document.getElementById('transcriptBox');
      box.textContent = transcript;
      box.classList.remove('placeholder');
      box.classList.add('visible');
      if (e.results[e.results.length - 1].isFinal) {
        stopRecording();
        sendToClause(transcript);
      }
    };

    recognition.onerror = () => stopRecording();
    recognition.onend = () => { if (isRecording) stopRecording(); };
  }

  function toggleRecording() {
    if (isRecording) { stopRecording(); return; }
    if (!recognition) return;
    isRecording = true;
    recognition.start();
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micIcon').textContent = '⏹️';
    document.getElementById('micInstruction').textContent = 'LISTENING — TAP TO STOP';
    const box = document.getElementById('transcriptBox');
    box.textContent = 'Listening...';
    box.classList.add('visible');
    box.classList.remove('placeholder');
  }

  function stopRecording() {
    isRecording = false;
    if (recognition) try { recognition.stop(); } catch(e) {}
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micIcon').textContent = '🎙️';
    document.getElementById('micInstruction').textContent = 'TAP TO SPEAK';
  }

  function sendText() {
    const val = document.getElementById('textInput').value.trim();
    if (!val) return;
    document.getElementById('textInput').value = '';
    sendToClause(val);
  }

  async function sendToClause(text) {
    if (!apiKey) { alert('Please enter your Claude API key first.'); return; }

    document.getElementById('loadingIndicator').classList.add('visible');
    document.getElementById('resultCard').classList.remove('visible');
    document.getElementById('sendBtn').disabled = true;

    const systemPrompt = `You are a personal assistant. The user will dictate something. Classify it as CALENDAR, REMINDER, NOTE, or EMAIL and extract the details.

Reply in this EXACT format with no extra text or explanation:
TYPE: (CALENDAR or REMINDER or NOTE or EMAIL)
TITLE: (brief title)
DATE: (date and time if applicable, otherwise leave blank)
TO: (email recipient name if EMAIL, otherwise leave blank)
BODY: (the full content — for EMAIL write a complete professional draft, for NOTE write the full note, for REMINDER write the reminder text, for CALENDAR write a brief description)`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1024,
          system: systemPrompt,
          messages: [{ role: 'user', content: text }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const responseText = data.content[0].text;
      parseAndDisplay(responseText, text);

    } catch (err) {
      document.getElementById('loadingIndicator').classList.remove('visible');
      document.getElementById('sendBtn').disabled = false;
      alert('Error: ' + err.message);
    }
  }

  function parseAndDisplay(responseText, originalText) {
    document.getElementById('loadingIndicator').classList.remove('visible');
    document.getElementById('sendBtn').disabled = false;

    const lines = responseText.trim().split('\n');
    const parsed = {};
    lines.forEach(line => {
      const colonIdx = line.indexOf(':');
      if (colonIdx > -1) {
        const key = line.substring(0, colonIdx).trim();
        const val = line.substring(colonIdx + 1).trim();
        parsed[key] = val;
      }
    });

    const type = parsed['TYPE'] || 'NOTE';
    const title = parsed['TITLE'] || originalText.substring(0, 50);
    const date = parsed['DATE'] || '';
    const to = parsed['TO'] || '';
    const body = parsed['BODY'] || '';

    // Badge
    const badge = document.getElementById('resultBadge');
    badge.className = `result-type-badge type-${type}`;
    badge.innerHTML = `${typeEmoji[type] || '📝'} ${typeLabel[type] || type}`;

    // Fields
    const fields = document.getElementById('resultFields');
    fields.innerHTML = '';

    const addField = (label, value) => {
      if (!value) return;
      fields.innerHTML += `
        <div class="result-field">
          <div class="result-field-label">${label}</div>
          <div class="result-field-value">${value.replace(/\n/g, '<br>')}</div>
        </div>`;
    };

    addField('Title', title);
    if (date) addField('Date & Time', date);
    if (to) addField('To', to);
    addField('Content', body);

    // Actions
    const actions = document.getElementById('resultActions');
    actions.innerHTML = '';

    if (type === 'CALENDAR') {
      const calUrl = buildCalendarUrl(title, date, body);
      actions.innerHTML = `<a href="${calUrl}" target="_blank" class="action-btn btn-primary">📅 Open in Calendar</a>`;
      actions.innerHTML += `<button onclick="copyText('${escapeAttr(title + (date ? ' — ' + date : '') + '\n' + body)}')" class="action-btn btn-secondary">Copy</button>`;
    } else if (type === 'REMINDER') {
      const remUrl = buildReminderUrl(title, date);
      actions.innerHTML = `<a href="${remUrl}" target="_blank" class="action-btn btn-primary">⏰ Add Reminder</a>`;
      actions.innerHTML += `<button onclick="copyText('${escapeAttr(title)}')" class="action-btn btn-secondary">Copy</button>`;
    } else if (type === 'NOTE') {
      const noteUrl = `notion://` ; // fallback to copy
      actions.innerHTML = `<button onclick="copyText('${escapeAttr(title + '\n\n' + body)}')" class="action-btn btn-primary">📋 Copy Note</button>`;
      actions.innerHTML += `<button onclick="openInNotes('${escapeAttr(title)}', '${escapeAttr(body)}')" class="action-btn btn-secondary">Open Notes App</button>`;
    } else if (type === 'EMAIL') {
      const mailUrl = `mailto:?subject=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}`;
      actions.innerHTML = `<a href="${mailUrl}" class="action-btn btn-primary">✉️ Open in Outlook</a>`;
      actions.innerHTML += `<button onclick="copyText('${escapeAttr(body)}')" class="action-btn btn-secondary">Copy Draft</button>`;
    }

    document.getElementById('resultCard').classList.add('visible');

    // History
    addToHistory(type, title);
  }

  function buildCalendarUrl(title, dateStr, notes) {
    // Opens Apple Calendar via URL scheme
    let url = `webcal://`;
    // Fallback: use x-apple-calevent for macOS
    const encoded = encodeURIComponent(title);
    return `x-apple-reminderkit://REMCDReminder?title=${encoded}`;
    // Best cross-platform: just use the calendar link
  }

  function buildCalendarUrl(title, dateStr, notes) {
    return `x-apple-calevent://new?title=${encodeURIComponent(title)}&notes=${encodeURIComponent(notes)}`;
  }

  function buildReminderUrl(title, dateStr) {
    return `x-apple-reminderkit://REMCDReminder?title=${encodeURIComponent(title)}`;
  }

  function openInNotes(title, body) {
    // Apple Notes URL scheme
    window.location.href = `applenotes://new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}`;
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('copiedToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }

  function escapeAttr(str) {
    return (str || '').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/"/g, '&quot;');
  }

  function addToHistory(type, title) {
    const now = new Date();
    const time = now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
    history.unshift({ type, title, time });
    if (history.length > 5) history.pop();

    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    section.style.display = 'block';
    list.innerHTML = history.map(h => `
      <div class="history-item">
        <div class="history-dot dot-${h.type}"></div>
        <div class="history-title">${h.title}</div>
        <div class="history-time">${h.time}</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
